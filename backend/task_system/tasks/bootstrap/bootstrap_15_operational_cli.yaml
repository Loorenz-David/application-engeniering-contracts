  - "Implement Typer operational commands for seed, inspect, backfill, cleanup, replay, worker control, reset-db, diagnostics"
  - "Generate scripts/ops.py entrypoint"
  - "Standardize Makefile baseline command surface"
  - "Generate env layering files .env.local/.env.testing/.env.validation/.env.production"

