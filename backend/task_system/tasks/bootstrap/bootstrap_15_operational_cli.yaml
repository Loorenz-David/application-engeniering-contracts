phase: 15
id: bootstrap_15_operational_cli
name: "Phase 15 — Operational CLI"
description: >
  Typer-based operational command runtime for replay, inspect, backfill,
  cleanup, seed, worker control, db reset, and diagnostics, with deterministic
  make command surface and dry-run safety for destructive operations.
