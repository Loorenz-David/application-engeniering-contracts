phase: 2
id: bootstrap_02_identity
name: "Phase 2 — Identity & Foundational Models"
description: >
  IdentityMixin with ULID client_id, generate_id(), HistoryRecord mixin, and the
  three core user tables: User, UserAppViewRecord, UserHistoryRecord. These are the
  lowest-level models every domain depends on.
depends_on: [1]

contracts:
  - id: "03"
    file: 03_models.md
    reason: ORM model contract — column types, table rules, migration safety
  - id: "40"
    file: 40_identity.md
    reason: IdentityMixin, generate_id() with ULID prefix, client_id conventions, prefix registry
  - id: "41"
    file: 41_user.md
    reason: User model, HistoryRecord mixin pattern, UserAppViewRecord, UserHistoryRecord

enums: []

implementation_steps:
  - "Implement IdentityMixin in models/base/identity.py: id (Integer PK), client_id (String, unique, indexed), generate_id(prefix) using python-ulid"
  - "Implement HistoryRecord mixin in models/base/history_record.py: updated_by_id (FK, declared_attr), updated_at, from_value (JSON), to_value (JSON), reason"
  - "Implement User model in models/tables/users/user.py — all columns from 41_user.md: username, email, password, online, last_online, role_id, last_app_view_record_id, last_history_record_id, relationships"
  - "Implement UserAppViewRecord in models/tables/users/user_app_view_record.py — user_id FK, entity_type (String indexed), entity_client_id (String nullable indexed), started_at, ended_at"
  - "Implement UserHistoryRecord in models/tables/users/user_history_record.py — inherits IdentityMixin + HistoryRecord, user_id FK, relationships to User"
  - "Register all three models in models/__init__.py so Alembic detects them"
  - "Generate and review the initial migration: alembic revision --autogenerate -m 'create_users_and_view_records'"
  - "Apply migration: alembic upgrade head"
  - "Document the prefix registry additions: usr, uavr, uhr in 40_identity.md or a local prefix_registry.md"

constraints:
  - "client_id is generated by the application using generate_id(prefix) — never by the database"
  - "password column stores only bcrypt hashes — never plaintext; never returned in any query or API response"
  - "online and last_online are written by the socket/presence layer only — no user-facing command may set these directly"
  - "last_app_view_record_id and last_history_record_id are FK shortcuts — updated atomically with the new child row, never by a separate background job"
  - "HistoryRecord rows are append-only — never update or delete a history record; to reverse a change, write a new row"
  - "db.session.flush() before setting last_history_record_id — flush assigns the DB-generated id without committing"
  - "entity_type in UserAppViewRecord must store an EntityType enum value (defined in Phase 7) — never a free-form string"

output_requirements:
  - "models/base/identity.py — IdentityMixin + generate_id()"
  - "models/base/history_record.py — HistoryRecord mixin"
  - "models/tables/users/user.py — User model"
  - "models/tables/users/user_app_view_record.py — UserAppViewRecord"
  - "models/tables/users/user_history_record.py — UserHistoryRecord"
  - "models/__init__.py — updated to import all three user model modules"
  - "migrations/versions/<rev>_create_users_and_view_records.py — reviewed and applied"

definition_of_done:
  - "alembic upgrade head applies the migration without errors on a fresh DB"
  - "alembic downgrade -1 correctly drops all created tables"
  - "User row can be inserted with generate_id('usr') as client_id and the ULID format is correct"
  - "UserAppViewRecord row can be inserted with a started_at and null ended_at"
  - "UserHistoryRecord row can be inserted and user.last_history_record_id updated atomically in the same transaction"
  - "No prefix collision in generate_id — usr, uavr, uhr are unique"
